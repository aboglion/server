events {
    worker_connections 1024;
}

http {

    include /etc/nginx/mime.types;
    # This is a fallback for files with unknown extensions.
    default_type application/octet-stream;

    server {
        listen 443 ssl;
        # Use the full domain name that the browser accesses
        server_name aboglion.top;

        # SSL certificate paths
        ssl_certificate /etc/nginx/ssl/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/privkey.pem;

        # Standard proxy headers for upstream services
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # for flask app
        location /api/ {
    proxy_pass http://trader:7070/api/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
            }

        location /static/ {
                    alias /TRADER_APP/static/;
                    types { # Re-add this block explicitly
                        text/css css;
                        application/javascript js;
                        image/x-icon ico;
                        image/png png;
                        image/jpeg jpeg;
                        image/gif gif;
                        application/font-woff2 woff2;
                        application/font-woff woff;
                        application/font-ttf ttf;
                        application/vnd.ms-fontobject eot;      
                    }
                    # No default_type here
                    add_header Cache-Control "public, max-age=31536000, immutable";
                    access_log off;
                    expires 30d;
                }

        # Location block for the Flask application (trader service)
        # All requests to /trader/ will be proxied to the Flask app
        location /trader/ {
            proxy_pass http://trader:7070/trader/; # Target for Flask application
            # No need to duplicate proxy_set_header if already defined globally in 'server' block,
            # but it doesn't hurt to keep them explicitly here if you prefer.
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
        # Redirect /trader to /trader/ to ensure consistent trailing slash
        location = /trader {
            return 301 /trader/;
        }

        location / {
            proxy_pass http://n8n:5678/; 
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_buffering off;
            proxy_cache off;
            chunked_transfer_encoding off;
        }
    }
    
}
