events {
    worker_connections 1024;
}

http {
    # It's generally better to include mime.types globally for Nginx
    include mime.types; 
    default_type application/octet-stream; 

    server {
        listen 443 ssl;
        server_name aboglion.top;
        

        ssl_certificate /etc/nginx/ssl/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/privkey.pem;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # New location block for /static/ at the root
        location /static/ {
            alias /TRADER_APP/static/; # This maps /static/ to /TRADER_APP/static/
            # The 'types' block here is not strictly necessary if mime.types is included,
            # but it can override or add specific types for this location.
            # However, if you want specific control, you can keep it, but ensure
            # it defines text/css.
            # types {
            #     text/css css;
            #     application/javascript js;
            #     image/x-icon ico;
            # }
            # default_type application/octet-stream; # This is already in http block
            add_header Cache-Control "public, max-age=31536000, immutable";
            access_log off;
            expires 30d;
        }

        # Original /trader/static/ block (keep if you still serve from /trader/static/)
        # If your Flask app references /static/ and you want Nginx to handle it directly
        # for both /static/ and /trader/static/, you might simplify.
        # But based on your current Flask setup with DispatcherMiddleware for /trader,
        # it's best to have Nginx handle /static/ directly.
        location /trader/static/ {
            alias /TRADER_APP/static/;
            # The types block here is redundant if 'include mime.types;' is in http.
            # If you remove it, default_type will come from http context.
            # types {
            #     text/css css;
            #     application/javascript js;
            #     image/x-icon ico;
            # }
            # default_type application/octet-stream;
            add_header Cache-Control "public, max-age=31536000, immutable";
            access_log off;
            expires 30d;
        }

        location / {
            proxy_pass http://n8n:5678/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_buffering off;
            proxy_cache off;
            chunked_transfer_encoding off;
        }

        location /trader/ {
            proxy_pass http://trader:7070/trader/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location = /trader {
            return 301 /trader/;
        }
    }
}