events {
    worker_connections 1024;
}

http {
    server {
        listen 443 ssl;
        server_name _;

        ssl_certificate /etc/nginx/ssl/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/privkey.pem;

        # הגדרות כלליות ל-Proxy
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # העבר בקשות ל-n8n
        location /n8n/ {
            proxy_pass http://n8n:5678;
        }

        # הגש קבצים סטטיים עבור ה-Trader ישירות (יותר מהיר)
        # מטפל בבקשות כמו: /trader/static/css/style.css
        location /trader/static/ {
            # ה-alias מצביע לתיקייה שהגדרנו ב-docker-compose
            alias /app/static/;
            access_log off;
            expires 30d;
        }

        # העבר את כל שאר הבקשות ל-Trader אל אפליקציית Gunicorn
        location /trader/ {
            proxy_pass http://trader:7070;
        }

        # הפנייה מהדף הראשי לאפליקציה
        location = / {
            return 301 /trader/;
        }
    }
}