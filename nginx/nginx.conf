events {
    worker_connections 1024;
}

http {
    # Ensure this includes the standard MIME types file.
    # This is crucial for Nginx to know that .css is text/css, .js is application/javascript, etc.
    include /etc/nginx/mime.types;
    # This is a fallback for files with unknown extensions.
    default_type application/octet-stream;

    server {
        listen 443 ssl;
        # Use the full domain name that the browser accesses
        server_name aboglion.top;

        # SSL certificate paths
        ssl_certificate /etc/nginx/ssl/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/privkey.pem;

        # Standard proxy headers for upstream services
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Location block for /static/ (your main static files from Flask)
        # This is the most critical block for the MIME type issue
        location /static/ {
            # 'alias' maps the URL path to a filesystem path on the Nginx container
            alias /TRADER_APP/static/;

            # No 'types' block needed here if 'include mime.types;' is working globally.
            # No 'default_type' needed here; let the global one apply if no type is found.

            # Cache control headers for long-term caching of static assets
            add_header Cache-Control "public, max-age=31536000, immutable";
            access_log off; # Static file access logs can be noisy, turn them off
            expires 30d;    # Tell browsers to cache for 30 days
        }

        # Location block for /trader/static/
        # This serves static files accessed via the /trader/static/ prefix.
        # It's good to keep this separate if your Flask app might generate paths like this,
        # though the /static/ block often covers most cases.
        location /trader/static/ {
            alias /TRADER_APP/static/; # Still serves from the same source directory

            # Same as above, no 'types' or 'default_type' needed if global include works
            add_header Cache-Control "public, max-age=31536000, immutable";
            access_log off;
            expires 30d;
        }

        # Location block for the Flask application (trader service)
        # All requests to /trader/ will be proxied to the Flask app
        location /trader/ {
            proxy_pass http://trader:7070/trader/; # Target for Flask application
            # No need to duplicate proxy_set_header if already defined globally in 'server' block,
            # but it doesn't hurt to keep them explicitly here if you prefer.
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Redirect /trader to /trader/ to ensure consistent trailing slash
        location = /trader {
            return 301 /trader/;
        }

        # Catch-all location for the n8n service
        # Any request not matched by the above 'location' blocks will go to n8n
        location / {
            proxy_pass http://n8n:5678/; # Target for n8n service
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            # These settings are good for real-time/streaming applications like n8n
            proxy_buffering off;
            proxy_cache off;
            chunked_transfer_encoding off;
        }
    }
    
}
