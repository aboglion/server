version: "3.8"

networks:
  app_net:
    driver: bridge

services:

  trader:
    build: ./TRADER
    ports:
      - "7070:7070"
    restart: unless-stopped
    environment:
      - PYTHONUNBUFFERED=1
    volumes:
      - ../data_backup/TRADER/LOGS:/app/LOGS
      - ../data_backup/TRADER/static:/app/TRADER/static:ro
    networks:
      - app_net

  n8n:
    image: n8nio/n8n:latest
    restart: unless-stopped
    ports:
      - "8743:5678"
    environment:
      - N8N_HOST=aboglion.top
      - N8N_PORT=5678
      - N8N_PROTOCOL=https
      - NODE_ENV=production
      - GENERIC_TIMEZONE=Asia/Jerusalem
      - NODE_FUNCTION_ALLOW_EXTERNAL=*
      - N8N_PATH=/n8n/   # קריטי! חובה להגדיר כדי ש-n8n יעבוד תחת תת-נתיב
    volumes:
      - ../data_backup/n8n_data/:/home/node/.n8n
    networks:
      - app_net

  nginx:
    image: nginx:latest
    restart: unless-stopped
    ports:
      - "8744:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ../data_backup/TRADER/static:/app/TRADER/static:ro
    depends_on:
      - n8n
      - trader
    networks:
      - app_net
